name: ichibase
description: >-
  Official Flutter client SDK for ichibase — Postgres, MongoDB, Auth, Storage
  and Realtime. Realtime auto-pauses in the background. Anon key only.
version: 0.4.0
repository: https://github.com/AliKales/ichibase-flutter
homepage: https://ichibase.com/docs
topics:
  - baas
  - postgres
  - mongodb
  - auth
  - realtime

environment:
  # >=3.4.0 because the default web session store uses package:web (^3.4.0).
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  # Used only on the web platform (via a conditional import) for the default
  # localStorage-backed session store; never loaded on the Dart VM.
  web: ^1.1.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
