name: ichibase
description: >-
  Official client-side SDK for ichibase — Postgres, MongoDB, Auth, Storage and
  Realtime from Flutter, Dart server, or CLI. Anon key only.
version: 0.2.0
repository: https://github.com/AliKales/ichibase-flutter
homepage: https://ichibase.com/docs
topics:
  - baas
  - postgres
  - mongodb
  - auth
  - realtime

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  # Used only on the web platform (via a conditional import) for the default
  # localStorage-backed session store; never loaded on the Dart VM.
  web: ^1.1.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
